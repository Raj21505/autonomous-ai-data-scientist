<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-inner">
            <a class="brand" href="index.html">
                <i data-lucide="sparkles"></i>
                AI Data Scientist
            </a>
            <div class="nav-links">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="cleaning.html">Overview</a>
                <a class="nav-link" href="target.html">Cleaning</a>
                <a class="nav-link" href="eda.html">EDA</a>
                <a class="nav-link" href="model.html">Model</a>
                <a class="nav-link active" href="dashboard.html">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="page container">
        <section class="hero">
            <h1>Interactive Dashboard</h1>
            <p class="hero-subtitle">A compact analytics view with model performance, feature behavior, and data quality in one clean interface.</p>
        </section>

        <div class="dashboard-shell">
            <aside class="side">
                <div class="brand">Insights</div>
                <button class="nav-item active" type="button" data-view="all">Dashboard</button>
                <button class="nav-item" type="button" data-view="model">Model Performance</button>
                <button class="nav-item" type="button" data-view="feature">Feature Stats</button>
                <button class="nav-item" type="button" data-view="quality">Data Quality</button>
            </aside>

            <section class="main">
                <div class="topbar">
                    <h2 class="title">Overview</h2>
                    <div class="btns">
                        <button type="button" onclick="refreshDashboard()">Refresh</button>
                        <button type="button" class="btn-secondary" onclick="downloadDashboardImage()">Download PNG</button>
                        <button type="button" class="btn-secondary" onclick="goBackModel()">Back</button>
                    </div>
                </div>

                <div id="dashboardStatus" class="status">Loading dashboard...</div>
                <div id="dashboardKpiGrid" class="kpi-grid"></div>
                <div id="dashboardAiSummary" class="quality-summary-card"></div>
                <div id="dashboardNumericSummary" class="quality-summary-card"></div>
                <div id="dashboardChartsGrid" class="charts-grid"></div>
            </section>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        if (window.lucide) {
            window.lucide.createIcons();
        }
    </script>
</body>
</html>
